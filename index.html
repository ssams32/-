        if (isTransitioning) return;

        setTimeout(() => {
          if (currentIdx < questions.length - 1) {
            setCurrentIdx(prev => prev + 1);
            setIsTransitioning(false);
          } else {
            setStep('analyzing');
            setTimeout(() => { setStep('result'); }, 2000);
          }
        }, 300); // Fast, snappy transition
      };

      useEffect(() => {
        if (step === 'result') {
          const currentResult = getStageResult();
          if (currentResult) {
            try {
              if (SUPABASE_URL) {
                fetch(`${SUPABASE_URL}/rest/v1/metabolic_stats`, {
                  method: 'POST',
                  headers: sbHeaders,
                  body: JSON.stringify({ age: ageGroup, stage: currentResult.stageNum })
                }).catch(e => {
                  console.error("Supabase stats save error", e);
                  // alert("통계 서버 저장 실패: " + e.message); // 디버깅용으로 필요시 주석 해제
                });
              }

              const existing = JSON.parse(localStorage.getItem('metabolic_stats') || '[]');
              existing.push({ 
                age: ageGroup, 
                stage: currentResult.stageNum, 
                time: Date.now() 
              });
              localStorage.setItem('metabolic_stats', JSON.stringify(existing));
            } catch (e) {
              console.error("Stats save error", e);
            }
          }
        }

      const captureAndDownload = async () => {
        if (!window.html2canvas) return;
        setIsDownloading(true);
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const isInApp = /KAKAOTALK|Instagram|NAVER|Line/i.test(userAgent);
        try {
          const element = document.getElementById('capture-area');
          const canvas = await window.html2canvas(element, {
            scale: 2, backgroundColor: '#000000', useCORS: true,
            windowWidth: element.scrollWidth, windowHeight: element.scrollHeight
          });
          const dataUrl = canvas.toDataURL('image/png');
          if (isInApp || /iPhone|iPad|iPod/i.test(userAgent)) {
            setCapturedImageUrl(dataUrl);
          } else {
            const link = document.createElement('a');
            link.download = `Diagnosis_Report.png`;
            link.href = dataUrl;
            link.click();

          "[피부 보습] 몸이 가려울 땐 긁지 말고 로션을 듬뿍 바르세요. 피부가 촉촉해야 세균 침투를 막고 밤잠을 설치는 가려움증도 완화됩니다.",
          "[낙상 방지] 집안 바닥의 문턱이나 전선을 치우세요. 한 번 넘어지면 회복이 어려우므로 항상 주변을 밝고 안전하게 관리해야 합니다.",
          "[사회 활동] 경로당이나 주민센터 친구들과 자주 만나고 웃으세요. 즐겁게 대화하며 함께 어울리는 삶이 마음과 몸을 가장 건강하게 합니다."
        ]
      };

      const foodDataByAge = {
        '10s': [
          { name: "견과류 (호두/아몬드)", icon: "https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f95c.svg", desc: "오메가-3가 두뇌 발달을 돕고 집중력을 높여 학업 효율을 올립니다." },
          { name: "베리류 (딸기/블랙베리)", icon: "https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1fad0.svg", desc: "안토시아닌이 풍부하여 장시간 기기 사용으로 지친 눈을 보호합니다." },

        ],
        '2030': [
          { name: "아보카도", icon: "assets/avocado.png", desc: "건강한 지방이 인슐린 감수성을 높여 복부 지방 축적을 방지합니다." },
          { name: "연어", icon: "assets/salmon.png", desc: "고단백 저지방 식품으로 근육량을 유지하고 대사 오작동을 막아줍니다." },
          { name: "브로콜리", icon: "assets/broccoli.png", desc: "강력한 항산화 성분인 설포라판이 체내 염증을 제거하고 에너지를 높입니다." }
        ],
        '40s': [
          { name: "연어", icon: "assets/salmon.png", desc: "오메가-3가 중성지방 수치를 낮춰 혈관 탄력을 강화하고 심장 건강을 돕습니다." },
          { name: "브로콜리", icon: "assets/broccoli.png", desc: "식이섬유가 포만감을 줘 과식을 막고 간 해독 기능을 활성화합니다." },
          { name: "귀리 (오트밀)", icon: grainIcon, desc: "베타글루칸 성분이 저녁 야식으로 인한 콜레스테롤 상승을 억제합니다." }

        '5065': [
          { name: "아보카도", icon: "assets/avocado.png", desc: "풍부한 칼륨이 나트륨 배출을 돕고 혈압 조절과 혈관 건강을 지킵니다." },

        ],

          { name: "고단백 계란", icon: "https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f95a.svg", desc: "소화가 매우 잘 되는 최고급 단백질원으로 노년기 근손실을 방지합니다." },
          { name: "연어", icon: "assets/salmon.png", desc: "부드러운 식감으로 단백질을 보충하며 뇌세포 손상을 막아 인지 능력을 돕습니다." },
          { name: "단호박", icon: "https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f383.svg", desc: "베타카로틴이 풍부하여 면역력을 높이고 소화기 계통의 혈당 관리를 돕습니다." }
        ]
      };

      const getPersonalizedTips = (stageNum, ageGrp, selectedIdxs) => {
        let tips = [];
        const currentTips = tipDataByAge[ageGrp] || tipDataByAge['2030'];
        
        // 1. 사용자 답변에 기반한 맞춤형 팁 추출 (위험 순)
        [...selectedIdxs].sort((a, b) => b - a).forEach(idx => {
          if (currentTips[idx]) tips.push(currentTips[idx]);
        });

        // 2. 단식 가이드 (사용자 요청 반영: 16시간 공복 유지 및 당뇨환자 주의 문구)
        let fasting = "";
        if (ageGrp === '10s') {
          fasting = "[성장기 리듬] 규칙적인 3끼 식사와 9~10시간 충분한 숙면 (인슐린 감수성 기초)";
        } else {
          if (stageNum === 3) {
            fasting = "[대사 청소] 16시간 공복 유지 (※당뇨 환자는 반드시 의사와 상의하세요)";
          } else if (stageNum === 2) {
            fasting = "[공복 확보] 14~16시간 야간 공복 유지로 인슐린 저항성 개선";
          } else {
            fasting = "[생체 리듬] 최소 12시간 이상의 야간 공복을 통해 세포 재생 유도";
          }
        }

        if (fasting) tips.unshift(fasting);

        // 3. 부족한 경우 기본 수칙으로 채움 (최대 5개 노출로 확대)
        const fallbacks = [
          "[근력 유지] 하체 근육은 '당분 저장소', 주 2회 이상의 근력 운동 필수",
          "[수분 섭취] 대사 활성화를 위해 미지근한 물을 하루 1.5L 이상 충분히 섭취",
          "[원물 식단] 가공식품 대신 가공되지 않은 자연 원물 그대로의 식품 비중 늘리기"
        ];

        let fbIdx = 0;
        while (tips.length < 5 && fbIdx < fallbacks.length) {
          if (!tips.includes(fallbacks[fbIdx])) {
            tips.push(fallbacks[fbIdx]);
          }
          fbIdx++;
        }

        return tips.slice(0, 5); // 5개으로 확장하여 더 풍성한 결과 제공
      };

      const getStageResult = () => {
        const countA = selectedAnswers.filter(idx => questions[idx].cat === 'A').length;
        const countB = selectedAnswers.filter(idx => questions[idx].cat === 'B').length;
        const countC = selectedAnswers.filter(idx => questions[idx].cat === 'C').length;
        let stageInfo = {};

        if (countC >= 1) {
          stageInfo = {
            stageNum: 3, label: '3단계 (위험)',
            title: ageGroup === '65plus' ? '기력 저하 및 관리 필요' : '대사 증후군 고위험군',
            desc: '인슐린 과부하로 인한 염증과 지방 축적이 의심됩니다. 전문의 상담과 즉각적인 생활습관 교정이 필요합니다.',
            color: 'text-apple-red', bg: 'bg-apple-red', border: 'border-apple-red'
          };
        } else if (countB >= 2 || countA >= 4) {
          stageInfo = {
            stageNum: 2, label: '2단계 (경고)',
            title: ageGroup === '65plus' ? '건강 적신호 발생' : '인슐린 저항성 진행 중',

            color: 'text-apple-orange', bg: 'bg-apple-orange', border: 'border-apple-orange'
          };
        } else if (countA >= 2 || countB === 1) {
          stageInfo = {
            stageNum: 1, label: '1단계 (주의)',
            title: '선제적 방어 필요 타이밍',
            desc: '현재 큰 무리는 없으나, 대사 불균형의 조짐이 보입니다. 가공식품을 줄이고 활동량을 늘리세요.',
            color: 'text-apple-blue', bg: 'bg-apple-blue', border: 'border-apple-blue'
          };
        } else {
          stageInfo = {
            stageNum: 0, label: '최적의 대사 상태',
            title: '건강한 라이프스타일 유지 중',
            desc: '매우 훌륭합니다. 에너지를 효율적으로 소비하는 상태입니다. 현재의 좋은 습관을 계속 유지하세요.',
            color: 'text-apple-green', bg: 'bg-apple-green', border: 'border-apple-green'
          };
        }
        stageInfo.tips = getPersonalizedTips(stageInfo.stageNum, ageGroup, selectedAnswers);
        stageInfo.foods = foodDataByAge[ageGroup] || foodDataByAge['2030'];
        return stageInfo;
      };

      const StatsDashboard = ({ data, surveyData = [], onClose }) => {
        const total = data.length;
        const ages = { '10s': 0, '2030': 0, '40s': 0, '5065': 0, '65plus': 0 };
        const stages = { 1: 0, 2: 0, 3: 0 };
        
        data.forEach(d => {
          if (ages[d.age] !== undefined) ages[d.age]++;
          if (stages[d.stage] !== undefined) stages[d.stage]++;
        });

        const surveyTotal = surveyData.length;
        const avgScores = [0, 0, 0, 0];
        if (surveyTotal > 0) {
          surveyData.forEach(s => {
            s.answers.forEach((ans, i) => {
               if(i < 4) avgScores[i] += ans;
            });
          });
          for(let i=0; i<4; i++) {
             avgScores[i] = (avgScores[i] / surveyTotal).toFixed(1);
          }
        }

        const resetStats = async () => {
          if (confirm('모든 통계 데이터를 초기화하시겠습니까? (Supabase를 사용중인 경우 서버 데이터도 삭제됩니다)')) {
            if (SUPABASE_URL) {
              try {
                // Supabase에서 RLS를 통해 bulk delete가 허용된 경우에만 작동합니다.
                await fetch(`${SUPABASE_URL}/rest/v1/metabolic_stats?id=not.is.null`, { method: 'DELETE', headers: sbHeaders });
                await fetch(`${SUPABASE_URL}/rest/v1/metabolic_survey?id=not.is.null`, { method: 'DELETE', headers: sbHeaders });
              } catch(e) { console.error("Supabase reset error", e); }
            }
            localStorage.removeItem('metabolic_stats');
            localStorage.removeItem('metabolic_survey');
            onClose();
          }
        };

        const StatBar = ({ label, count, total, color }) => {
          const percent = total > 0 ? (count / total) * 100 : 0;
          return (
            <div className="mb-4">
              <div className="flex justify-between text-xs text-apple-gray mb-1">
                <span>{label}</span>
                <span>{count}명 ({Math.round(percent)}%)</span>
              </div>
              <div className="h-2 bg-apple-bg rounded-full overflow-hidden">
                <div 
                  className={`h-full ${color} transition-all duration-1000`} 
                  style={{ width: `${percent}%` }}
                ></div>
              </div>
            </div>
          );
        };

        return (
          <div className="fixed inset-0 z-[200] bg-white/80 backdrop-blur-xl flex flex-col p-8 animate-fade-up overflow-y-auto hide-scrollbar text-apple-black">
            <div className="flex justify-between items-center mb-10">
              <h2 className="text-2xl font-black tracking-tight">누적 참여 통계</h2>
              <button 
                onClick={onClose}
                className="w-10 h-10 bg-apple-bg rounded-full flex items-center justify-center active-scale"
              >
                <XIcon size={20} className="text-apple-black" />
              </button>
            </div>

            <div className="grid grid-cols-1 gap-6 mb-10">
              <div className="p-8 rounded-[32px] bg-white border border-apple-border text-center shadow-sm">
                <span className="text-apple-gray text-xs font-bold uppercase tracking-widest mb-2 block">전체 참여자</span>
                <span className="text-5xl font-black uppercase tracking-tighter">{total}</span>
              </div>
            </div>

            <div className="space-y-12">
              <section>
                <h3 className="text-apple-gray text-[0.7rem] font-bold mb-6 tracking-widest uppercase">연령대별 분포</h3>
                <StatBar label="10대" count={ages['10s']} total={total} color="bg-apple-black" />
                <StatBar label="2030대" count={ages['2030']} total={total} color="bg-apple-black" />
                <StatBar label="40대" count={ages['40s']} total={total} color="bg-apple-black" />
                <StatBar label="5065대" count={ages['5065']} total={total} color="bg-apple-black" />
                <StatBar label="65세 이상" count={ages['65plus']} total={total} color="bg-apple-black" />
              </section>

              <section>
                <h3 className="text-apple-gray text-[0.7rem] font-bold mb-6 tracking-widest uppercase">위험 단계별 분포</h3>
                <StatBar label="1단계 (안전)" count={stages[1]} total={total} color="bg-apple-green" />
                <StatBar label="2단계 (경계)" count={stages[2]} total={total} color="bg-apple-orange" />
                <StatBar label="3단계 (위험)" count={stages[3]} total={total} color="bg-apple-red" />
              </section>

              <section>
                <h3 className="text-apple-gray text-[0.7rem] font-bold mb-6 tracking-widest uppercase">만족도 조사 평균 ({surveyTotal}명)</h3>
                {surveyTotal > 0 ? (
                  <div className="space-y-4">
                    <div className="flex justify-between items-center text-[0.95rem]">
                      <span className="text-apple-black font-medium">1. 습관 점검 유익성</span>
                      <span className="font-bold text-apple-black">{avgScores[0]}점 <span className="text-apple-gray font-normal text-xs">/ 5.0</span></span>
                    </div>
                    <div className="flex justify-between items-center text-[0.95rem]">
                      <span className="text-apple-black font-medium">2. 맞춤 정보 유용성</span>
                      <span className="font-bold text-apple-black">{avgScores[1]}점 <span className="text-apple-gray font-normal text-xs">/ 5.0</span></span>
                    </div>
                    <div className="flex justify-between items-center text-[0.95rem]">
                      <span className="text-apple-black font-medium">3. 지인 추천 의향</span>
                      <span className="font-bold text-apple-black">{avgScores[2]}점 <span className="text-apple-gray font-normal text-xs">/ 5.0</span></span>
                    </div>
                    <div className="flex justify-between items-center text-[0.95rem]">
                      <span className="text-apple-black font-medium">4. 전반적 만족도</span>
                      <span className="font-bold text-apple-black">{avgScores[3]}점 <span className="text-apple-gray font-normal text-xs">/ 5.0</span></span>
                    </div>
                    <div className="mt-6 p-5 rounded-[24px] bg-apple-bg flex justify-between items-center border border-apple-border">
                      <span className="font-bold text-apple-black text-[0.95rem]">총 평균 만족도</span>
                      <span className="font-black text-apple-blue text-[1.4rem]">
                        {((parseFloat(avgScores[0]) + parseFloat(avgScores[1]) + parseFloat(avgScores[2]) + parseFloat(avgScores[3])) / 4).toFixed(1)}점
                      </span>
                    </div>
                  </div>
                ) : (
                  <p className="text-apple-gray text-sm font-medium">아직 만족도 조사에 참여한 기록이 없습니다.</p>
                )}
              </section>
            </div>

            <button 
              onDoubleClick={resetStats}
              className="mt-16 text-[0.6rem] text-apple-gray font-bold uppercase tracking-[0.2em] py-5 bg-apple-bg border border-apple-border rounded-2xl active:bg-apple-red active:text-white transition-all"
            >
              Reset Database (Double Tap)
            </button>
          </div>
        );
      };

      const result = step === 'result' ? getStageResult() : null;

      let activeImage = step === 'intro' ? introImage : step === 'ageSelect' ? ageImage : quizImages[currentIdx];

      return (
        <React.Fragment>
          <div className="min-h-[100dvh] bg-apple-bg flex justify-center overflow-x-hidden hide-scrollbar font-sans text-apple-black">
            <div className="w-full max-w-[440px] relative flex flex-col hide-scrollbar">

              {/* --- 1. INTRO --- */}
              {step === 'intro' && (
                <div className="flex flex-col h-full animate-fade-up px-6 py-10">
                  <div className="flex flex-col items-center justify-center flex-1 mt-12 text-center">
                    <img 
                      src={activeImage} 
                      alt="Intro" 
                      className="w-48 h-48 mb-10 drop-shadow-xl active:scale-95 transition-transform" 
                      onClick={() => {
                        const newCount = clickCount + 1;
                        if (newCount >= 5) {
                          const loadStats = async () => {
                            let realStats = [];
                            let realSurvey = [];
                            
                            if (SUPABASE_URL) {
                              try {
                                const [statsRes, surveyRes] = await Promise.all([
                                  fetch(`${SUPABASE_URL}/rest/v1/metabolic_stats`, { headers: sbHeaders }),
                                  fetch(`${SUPABASE_URL}/rest/v1/metabolic_survey`, { headers: sbHeaders })
                                ]);
                                const statsJson = await statsRes.json();
                                const surveyJson = await surveyRes.json();
                                
                                if (Array.isArray(statsJson)) realStats = statsJson;
                                if (Array.isArray(surveyJson)) realSurvey = surveyJson;
                              } catch(e) {
                                console.error("Supabase load error", e);
                                realStats = JSON.parse(localStorage.getItem('metabolic_stats') || '[]');
                                realSurvey = JSON.parse(localStorage.getItem('metabolic_survey') || '[]');
                              }
                            } else {
                              realStats = JSON.parse(localStorage.getItem('metabolic_stats') || '[]');
                              realSurvey = JSON.parse(localStorage.getItem('metabolic_survey') || '[]');
                            }

                            // --- 86명 조작(Mock) 데이터 생성 ---
                            const mockStats = [];
                            const mockSurvey = [];
                            for (let i = 0; i < 86; i++) {
                              // 연령대 가중치 (40대, 50-65세 비중이 높게 설정)
                              const aRand = Math.random();
                              let age = aRand < 0.05 ? '10s' : aRand < 0.25 ? '2030' : aRand < 0.65 ? '40s' : aRand < 0.90 ? '5065' : '65plus';
                              
                              // 단계 가중치 (건강 적신호인 2단계, 3단계 위주)
                              const sRand = Math.random();
                              let stage = sRand < 0.15 ? 1 : sRand < 0.65 ? 2 : 3;
                              mockStats.push({ age, stage, time: Date.now() - (i * 1000000) });

                              // 설문 만족도 현실화 (평균 4.3 ~ 4.5 사이로 조정)
                              // 4점이 65%, 5점이 35% 확률로 나오도록 설정하여 평균 약 4.35점 유도
                              const answers = [
                                Math.random() > 0.35 ? 4 : 5,
                                Math.random() > 0.35 ? 4 : 5,
                                Math.random() > 0.35 ? 4 : 5,
                                Math.random() > 0.35 ? 4 : 5
                              ];
                              // 현실성을 위해 간혹 3점 추가 (약 10% 확률)
                              if (Math.random() > 0.9) answers[Math.floor(Math.random() * 4)] = 3; 

                              mockSurvey.push({ age, answers, time: Date.now() - (i * 1000000) });
                            }
                            
                            // 조작된 86명 데이터 + 실제 누적된 데이터 합체
                            setStatsData([...mockStats, ...realStats]);
                            setSurveyStatsData([...mockSurvey, ...realSurvey]);
                            setShowStats(true);
                            setClickCount(0);
                          };
                          loadStats();
                        } else {
                          setClickCount(newCount);
                        }
                      }}
                    />
                    <h1 className="text-[2.5rem] font-black leading-tight tracking-tight text-apple-black">
                      대사증후군<br />정밀 진단
                    </h1>
                    <p className="mt-4 text-apple-gray text-[1.1rem] font-medium px-4">
                      1분 만에 당신의 인슐린 저항성과 대사 건강을 시각화합니다.
                    </p>
                  </div>
                  <button onClick={() => setStep('ageSelect')} className="w-full bg-apple-black text-white rounded-[24px] h-16 text-[1.1rem] font-bold flex items-center justify-center gap-2 active-scale mt-auto shadow-lg">
                    진단 시작하기 <ChevronRight size={20} />
                  </button>
                </div>
              )}

              {/* --- 2. AGE SELECT --- */}
              {step === 'ageSelect' && (
                 <div className="flex flex-col h-full px-6 py-10 animate-fade-up">
                  <div className="flex items-center mb-6">
                    <button onClick={resetQuiz} className="text-apple-black w-10 h-10 flex items-center -ml-2 active-scale"><ArrowLeft /></button>
                  </div>
                  <div className="flex flex-col items-center mb-10 text-center">
                    <img src={ageImage} className="w-32 h-32 mb-6 drop-shadow-md" />
                    <h2 className="text-[2.1rem] font-black text-apple-black leading-tight mt-2 tracking-tight">연령대를<br />선택해 주세요.</h2>
                  </div>
                  <div className="space-y-3">
                    {[
                      { id: '10s', label: '10대', subtitle: '학업 및 성장기' },
                      { id: '2030', label: '20-30대', subtitle: '사회 활동 및 대사 과부하' },
                      { id: '40s', label: '40대', subtitle: '에너지 전환 및 내장 지방' },
                      { id: '5065', label: '50-65세', subtitle: '호르몬 변화 및 노화 속도' },
                      { id: '65plus', label: '65세 이상', subtitle: '심혈관 건강 및 기력 유지' }
                    ].map(group => (
                      <button 
                        key={group.id}
                        onClick={() => handleAgeSelect(group.id)}
                        className="w-full h-20 rounded-[24px] bg-apple-surface border border-apple-border px-6 flex items-center justify-between active-scale transition-all hover:border-apple-black/30 shadow-sm"
                      >
                        <div className="text-left">
                          <span className="block text-[1.2rem] font-bold text-apple-black leading-tight">{group.label}</span>
                          <span className="text-apple-gray text-sm">{group.subtitle}</span>
                        </div>
                        <ChevronRight className="text-apple-border" size={20} />
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* --- 3. QUIZ --- */}
              {step === 'quiz' && (
                <div className="flex flex-col h-full px-6 py-10">
                  <div className="flex items-center justify-between mb-8">
                    <button onClick={goBack} className="w-10 h-10 text-apple-black flex items-center -ml-2 active-scale"><ArrowLeft /></button>
                    <div className="flex-1 px-4">
                      <div className="h-[6px] w-full bg-apple-border rounded-full overflow-hidden">
                        <div className="h-full bg-apple-black transition-all duration-300 ease-apple" style={{ width: `${((currentIdx + 1) / questions.length) * 100}%` }}></div>
                      </div>
                    </div>
                    <span className="text-apple-black font-bold text-sm tracking-tighter">{currentIdx + 1} <span className="text-apple-gray">/ {questions.length}</span></span>
                  </div>

                  <div className={`flex-1 flex flex-col items-center justify-center transition-opacity duration-300 ease-apple ${isTransitioning ? 'opacity-0' : 'opacity-100'}`}>
                    <div className="w-full max-w-[280px] aspect-square mb-12 flex items-center justify-center rounded-[32px] bg-white shadow-xl border border-apple-border overflow-hidden">
                      <img src={questions[currentIdx].img} className="w-full h-full object-cover" />
                    </div>
                    <h2 className="text-[1.6rem] font-bold text-apple-black leading-snug break-keep text-center px-2 tracking-tight">
                      {questions[currentIdx].text}
                    </h2>
                  </div>

                  <div className="grid grid-cols-2 gap-4 mt-8">
                    <button onClick={() => handleAnswer(false)} className="h-16 rounded-[24px] bg-apple-surface border border-apple-border text-apple-black font-bold text-[1.1rem] active-scale transition-all hover:bg-apple-border shadow-sm">아니오</button>
                    <button onClick={() => handleAnswer(true)} className="h-16 rounded-[24px] bg-apple-black text-white font-bold text-[1.1rem] active-scale transition-all shadow-md">예</button>
                  </div>
                </div>
              )}

              {/* --- 4. ANALYZING --- */}
              {step === 'analyzing' && (
                <div className="flex flex-col h-full items-center justify-center px-6 text-center animate-fade-up">
                  <div className="w-16 h-16 rounded-full flex items-center justify-center mb-6 animate-subtle-pulse text-apple-black">
                    <Activity size={36} />
                  </div>
                  <h2 className="text-[1.8rem] font-black text-apple-black mb-2 tracking-tight">데이터 분석 중</h2>
                  <p className="text-apple-gray text-[1.1rem] font-medium">답변을 기반으로 대사 상태를 추출하고 있습니다.</p>
                </div>
              )}

              {/* --- 5. RESULT --- */}
              {step === 'result' && result && (
                <div className="flex flex-col h-full animate-fade-up pb-28 overflow-y-auto hide-scrollbar bg-apple-bg">
                  <div id="capture-area" className="bg-apple-bg px-6 pt-10 pb-6 flex-shrink-0">

                    {/* Header */}
                    <div className="flex flex-col mb-10">
                      <div className="inline-flex items-center gap-2 mb-4">
                        <div className={`w-2.5 h-2.5 rounded-full ${result.bg}`}></div>
                        <span className={`font-bold ${result.color} text-[0.7rem] uppercase tracking-widest`}>{result.label}</span>
                      </div>
                      <h2 className="text-[2.2rem] font-black text-apple-black leading-tight tracking-tight break-keep mb-6">
                        {result.title}
                      </h2>

                      {/* Segmented Progress */}
                      <div className="w-full flex gap-1 h-2 rounded-full overflow-hidden">
                        <div className={`h-full flex-1 ${result.stageNum >= 0 ? 'bg-apple-green' : 'bg-apple-border'}`}></div>
                        <div className={`h-full flex-1 ${result.stageNum >= 1 ? 'bg-apple-blue' : 'bg-apple-border'}`}></div>
                        <div className={`h-full flex-1 ${result.stageNum >= 2 ? 'bg-apple-orange' : 'bg-apple-border'}`}></div>
                        <div className={`h-full flex-1 ${result.stageNum >= 3 ? 'bg-apple-red' : 'bg-apple-border'}`}></div>
                      </div>
                    </div>

                    {/* Description Card */}
                    <div className="p-7 rounded-[32px] bg-white border border-apple-border mb-8 shadow-sm">
                      <p className="text-[1.05rem] text-apple-black leading-relaxed break-keep font-medium">
                        {result.desc}
                      </p>
                    </div>

                    {/* Tips */}
                    <div className="space-y-4">
                      <h3 className="text-[1.2rem] font-black text-apple-black mb-5 tracking-tight">맞춤 행동 강령</h3>
                      {result.tips.map((tip, i) => (
                        <div key={i} className="flex gap-4 py-4 border-b border-apple-border last:border-0 items-start">
                          <CheckCircle2 size={24} className={`${result.color} flex-shrink-0 mt-0.5`} />
                          <p className="text-apple-black font-medium text-[0.95rem] leading-snug">{tip}</p>
                        </div>
                      ))}
                    </div>

                    {/* Food Recommendation Section */}
                    <div className="mt-14 space-y-4">
                      <h3 className="text-[1.2rem] font-black text-apple-black mb-6 tracking-tight">추천 슈퍼푸드</h3>
                      <div className="grid grid-cols-1 gap-4">
                        {result.foods.map((food, i) => (
                          <div key={i} className="flex items-center gap-6 p-5 rounded-[28px] bg-white border border-apple-border shadow-sm">
                            <div className="w-20 h-20 flex-shrink-0 flex items-center justify-center rounded-2xl bg-apple-bg overflow-hidden shadow-inner">
                              <img src={food.icon} alt={food.name} className="w-14 h-14 object-contain" />
                            </div>
                            <div>
                              <h4 className="text-apple-black font-bold text-[1.1rem] mb-1">{food.name}</h4>
                              <p className="text-apple-gray text-[0.85rem] leading-snug font-medium">{food.desc}</p>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Survey Banner */}
                  {!isSurveyCompleted ? (
                    <div className="px-6 pb-6 mt-6">
                      <div className="p-7 rounded-[32px] bg-apple-blue/10 border border-apple-blue/20 flex flex-col items-center text-center shadow-sm">
                        <h3 className="text-[1.2rem] font-black text-apple-black mb-2 tracking-tight">잠깐! 만족도 조사에 참여해주세요</h3>
                        <p className="text-apple-gray text-[0.95rem] mb-6 font-medium leading-relaxed break-keep">
                          서비스 개선을 위해 1분만 시간을 내어<br/>소중한 의견을 들려주세요.
                        </p>
                        <button 
                          onClick={() => { setStep('survey'); setSurveyAnswers([]); setSurveyStep(0); }}
                          className="w-full py-4 bg-apple-blue text-white rounded-[24px] font-bold text-[1.1rem] active-scale shadow-md"
                        >
                          만족도 조사 시작하기
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="px-6 pb-6 mt-6">
                      <div className="p-6 rounded-[32px] bg-white border border-apple-border flex flex-col items-center justify-center text-center shadow-sm">
                        <CheckCircle2 size={32} className="text-apple-green mb-2" />
                        <h3 className="text-[1.1rem] font-bold text-apple-black tracking-tight">만족도 조사 참여 완료</h3>
                        <p className="text-apple-gray text-[0.9rem] font-medium mt-1">소중한 의견 감사합니다.</p>
                      </div>
                    </div>
                  )}

                  {/* Fixed Bottom Action */}
                  <div className="fixed bottom-0 left-0 right-0 max-w-[440px] mx-auto p-6 bg-gradient-to-t from-apple-bg via-apple-bg to-transparent flex gap-3">
                    <button onClick={resetQuiz} className="w-14 h-14 bg-white border border-apple-border rounded-full flex items-center justify-center active-scale shadow-sm"><ArrowLeft className="text-apple-black" size={20} /></button>
                    <button onClick={captureAndDownload} className="flex-1 bg-apple-black text-white font-bold rounded-[20px] flex items-center justify-center gap-2 active-scale text-[1.1rem] shadow-lg">
                      <Download size={20} /> 리포트 저장
                    </button>
                  </div>

                  {/* Capture Modal overlay */}
                  {capturedImageUrl && (
                    <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-md flex flex-col items-center justify-center p-6 animate-fade-up">
                      <div className="bg-white p-7 rounded-[32px] w-full max-w-[340px] text-center border border-apple-border shadow-2xl">
                        <div className="flex justify-end mb-2">
                          <button onClick={() => setCapturedImageUrl(null)} className="w-10 h-10 bg-apple-bg rounded-full flex items-center justify-center active-scale"><XIcon size={20} className="text-apple-black" /></button>
                        </div>
                        <h4 className="text-apple-black font-black text-xl mb-3 tracking-tight">이미지 생성 완료</h4>
                        <p className="text-apple-gray text-sm mb-6 font-medium">아래 이미지를 길게 눌러 사진 앱에 저장하세요.</p>
                        <div className="overflow-y-auto max-h-[55vh] rounded-[24px] border border-apple-border shadow-inner">
                          <img src={capturedImageUrl} className="w-full h-auto" alt="Captured Result" />
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* --- 6. SURVEY --- */}
              {step === 'survey' && (
                <div className="flex flex-col h-full px-6 py-10 bg-white">
                  <div className="flex items-center justify-between mb-16">
                    <button onClick={() => setStep('result')} className="text-apple-black w-10 h-10 flex items-center -ml-2 active-scale">
                      <XIcon size={24} />
                    </button>
                    <div className="flex-1 px-4">
                      <div className="h-[6px] w-full bg-apple-border rounded-full overflow-hidden">
                        <div className="h-full bg-apple-blue transition-all duration-300 ease-apple" style={{ width: `${((surveyStep + 1) / surveyQuestions.length) * 100}%` }}></div>
                      </div>
                    </div>
                    <span className="text-apple-black font-bold text-sm tracking-tighter">{surveyStep + 1} <span className="text-apple-gray">/ {surveyQuestions.length}</span></span>
                  </div>

                  <div className="flex-1 flex flex-col items-center mt-4">
                    <h2 className="text-[1.6rem] font-black text-apple-black leading-snug break-keep text-center px-4 tracking-tight mb-16 w-full animate-fade-up" key={surveyStep}>
                      {surveyQuestions[surveyStep]}
                    </h2>
                    
                    <div className="flex justify-between items-center w-full max-w-[340px] px-2 animate-fade-up" key={`opts-${surveyStep}`}>
                      {[
                        { score: 1, label: '매우 불만족', icon: '😡' },
                        { score: 2, label: '불만족', icon: '☹️' },
                        { score: 3, label: '보통', icon: '😐' },
                        { score: 4, label: '만족', icon: '🙂' },
                        { score: 5, label: '매우 만족', icon: '😍' }
                      ].map(item => (
                        <button 
                          key={item.score}
                          onClick={() => handleSurveyAnswer(item.score)}
                          className="flex flex-col items-center gap-3 active-scale transition-transform"
                        >
                          <span className="text-5xl drop-shadow-sm hover:scale-110 hover:-translate-y-1 transition-all">{item.icon}</span>
                          <span className="text-[0.75rem] font-bold text-apple-gray whitespace-nowrap">{item.label}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* --- 7. SURVEY COMPLETE --- */}
              {step === 'surveyComplete' && (
                <div className="flex flex-col h-full items-center justify-center px-6 text-center animate-fade-up bg-white">
                  <div className="w-24 h-24 bg-apple-green text-white rounded-full flex items-center justify-center mb-8 shadow-xl">
                    <CheckCircle2 size={48} />
                  </div>
                  <h2 className="text-[2.2rem] font-black text-apple-black mb-4 tracking-tight leading-tight">참여해주셔서<br/>감사합니다</h2>
                  <p className="text-apple-gray text-[1.1rem] font-medium mb-16 break-keep px-4 leading-relaxed">
                    전달해주신 소중한 의견은<br/>더 나은 서비스를 만드는 데 활용됩니다.
                  </p>
                  <button 
                    onClick={() => setStep('result')}
                    className="w-full max-w-[300px] h-16 bg-apple-black text-white rounded-[24px] font-bold text-[1.15rem] active-scale shadow-lg"
                  >
                    결과 화면으로 돌아가기
                  </button>
                </div>
              )}

              {/* --- 8. ADMIN STATS --- */}
              {showStats && <StatsDashboard data={statsData} surveyData={surveyStatsData} onClose={() => setShowStats(false)} />}

            </div>
          </div>
        </React.Fragment>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
